<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinchan Jump Adventure</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <h1>Shinchan Jump Adventure</h1>
    <p class="subtitle">A simple Mario-style platform game starring Shinchan.</p>
    <section class="hud">
      <span id="score">Score: 0</span>
      <span id="lives">Lives: 3</span>
      <span id="goal">Reach the flag!</span>
    </section>
    <canvas id="game" width="960" height="420" aria-label="2D platform game"></canvas>
    <p class="controls">
      Controls: <strong>← →</strong> move, <strong>Space / ↑</strong> jump, <strong>R</strong> restart.
    </p>
  </main>

  <script src="game.js"></script>
</body>
</html>
